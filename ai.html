<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1">
        <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="./styles/ai.css">
        <script src="https://unpkg.com/lucide@latest"></script>
        <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    </head>
    <body>
        <div id="particles-js"></div>
        <div class="aitainer">
            <div class="ai-msgs" id="aiMsgs">
                <div class="ai-welcome">
                    <div class="ai-welcome-icon"><i data-lucide="atom"></i></div>
                    <h2>krypton ai</h2>
                    <p>ask me anything.</p>
                </div>
            </div>
            <div class="ai-input-area">
                <div class="ai-input-wpr">
                    <div class="model-sel" id="modelSel">
                        <button class="model-btn" id="modelBtn">
                            <i data-lucide="cpu"></i>
                            <span id="modelBadge">Gemini 3 Flash Preview</span>
                            <i data-lucide="chevron-up" class="model-chv"></i>
                        </button>
                        <div class="model-dr" id="modelDr">
                            <div class="model-option active" data-model="google/gemini-3-flash-preview">
                                <span class="prov-dot"></span>3 Flash Preview
                            </div>
                            <div class="model-option" data-model="google/gemini-2.5-flash">
                                <span class="prov-dot"></span>2.5 Flash
                            </div>
                        </div>
                    </div>
                    <textarea class="ai-input" id="aiInput" placeholder="ask anything..." rows="1"></textarea>
                    <button class="ai-send-btn" id="aiSend">
                        <i data-lucide="send"></i>
                    </button>
                </div>
            </div>
        </div>
        <script src="./scripts/ai.js"></script>
    </body>
</html>
