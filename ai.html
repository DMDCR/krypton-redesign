<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1">
        <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="./styles/ai.css">
        <script src="https://unpkg.com/lucide@latest"></script>
    </head>
    <body>
        <div id="particles-js"></div>
        <div class="aitainer">
            <div class="ai-header">
                <button class="nav-btn" id="backBtn">
                    <i data-lucide="arrow-left"></i>
                </button>
                <div class="ai-header-tl">
                    <div class="ai-header-icon"><i data-lucide="atom"></i></div>
                    <span>krypton ai</span>
                </div>
                <button class="nav-btn" id="clearBtn">
                    <i data-lucide="trash-2"></i>
                </button>
            </div>
            <div class="ai-msgs" id="aiMsgs">
                <div class="ai-welcome">
                    <div class="ai-welcome-icon"><i data-lucide="atom"></i></div>
                    <h2>krypton ai</h2>
                    <p>ask me anything.</p>
                </div>
            </div>
            <div class="ai-input-area">
                <div class="ai-input-wpr">
                    <textarea class="ai-input" id="aiInput" placeholder="ask anything..." rows="1"></textarea>
                    <button class="ai-send-btn" id="aiSend">
                        <i data-lucide="send"></i>
                    </button>
                </div>
            </div>
        </div>
        <script src="./scripts/ai.js"></script>
    </body>
</html>
